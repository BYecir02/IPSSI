stages:
  - test
  - build
  - deploy

test-unit:
  image: node:18-alpine
  stage: test
  script:
    - cd devops/todo-api
    - npm ci
    - npm test

test-integration:
  image: node:18-alpine
  stage: test
  services:
    - postgres:15-alpine
  variables:
    POSTGRES_DB: todo_db
    POSTGRES_USER: todo_user
    POSTGRES_PASSWORD: todo_pass
    DB_HOST: postgres
    DB_USER: todo_user
    DB_PASSWORD: todo_pass
    DB_NAME: todo_db
  script:
    - cd devops/todo-api
    - npm ci
    - npm test

build-and-push:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - cd devops/todo-api
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USER" --password-stdin
    - docker build -t $DOCKERHUB_USER/todo-api:$CI_COMMIT_SHORT_SHA -t $DOCKERHUB_USER/todo-api:latest .
    - docker push $DOCKERHUB_USER/todo-api:$CI_COMMIT_SHORT_SHA
    - docker push $DOCKERHUB_USER/todo-api:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
