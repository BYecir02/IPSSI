services:
  api:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./src:/app/src
      - api-logs:/app/logs
    env_file:
      - .env
    environment:
      - DB_HOST=db # Priorité sur le .env pour le nom de service interne
    networks:
      - frontend
      - backend
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432" # Gardé pour le debug local si besoin
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-todo_user} -d ${POSTGRES_DB:-todo_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  frontend:
  backend:

volumes:
  postgres-data:
  api-logs:
